  modeledNote: |
    The Area/Boundary, POI, and Transportation Noise endpoint paths are modeled
    from ATTOM's documented resource groups (Area API v2/v4 with a new GeoJSON
    boundary endpoint, POI API v4 search + category lookup, and a
    transportation-noise resource). ATTOM confirms these resource families exist
    and are versioned to v4, but does not publish the exact path strings in the
    public help articles reviewed; only /v4/neighborhood/community is shown as a
    literal v4 example. Confirm the exact paths and query parameters against the
    live interactive docs at api.developer.attomdata.com/docs before production
    use.
