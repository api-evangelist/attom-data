aid: attom-data
name: ATTOM
review:
  question: Does ATTOM expose a documented public WebSocket API?
  answer: false
  date: '2026-07-03'
  reviewer: API Evangelist
  asyncapiSpecCreated: false
  asyncapiScopeNote: |
    No AsyncAPI document was authored. ATTOM's entire public API surface is
    request/response REST over HTTPS through the api.gateway.attomdata.com
    gateway. There is no server-push transport (WebSocket or SSE) on ATTOM's
    API to model. Bulk / high-volume needs are met with batch data delivery
    and data-warehouse feeds, not a streaming socket, so there is nothing for
    an AsyncAPI document to describe.
findings:
  summary: |
    ATTOM Data Solutions does not publish a documented public WebSocket API.
    ATTOM is a property, real estate, and location data provider. Its API
    (marketed as ATTOM Cloud / the ATTOM API) is a family of REST resources
    served from the gateway host https://api.gateway.attomdata.com. Classic
    Property API endpoints use the URI pattern
    /propertyapi/v1.0.0/{resource}/{package}?{query}; version 4 endpoints drop
    the component name and use /v4/{resource}; area geography endpoints use
    /areaapi/v2.0.0/. Every request is authenticated with an API key sent in
    the `apikey` header and returns JSON (or XML). All calls are synchronous
    request/response GETs. No realtime, bidirectional, or streaming WebSocket
    (ws:// or wss://) endpoint is documented anywhere in ATTOM's developer
    documentation as of the review date.
  openSource: |
    ATTOM's API and underlying data warehouse are commercial and proprietary;
    there is no open-source server component. Access requires an ATTOM API key
    (30-day free trial, then a paid subscription). Client SDK examples in
    Python, PHP, Ruby, and JavaScript are provided in ATTOM's developer docs,
    but the platform itself is not open source.
  transports:
    - protocol: REST
      scheme: https
      baseURL: https://api.gateway.attomdata.com
      documented: true
      note: All ATTOM API endpoints (propertyapi/v1.0.0, v4, areaapi/v2.0.0) are REST GETs authenticated with the apikey header.
    - protocol: WebSocket
      scheme: wss
      documented: false
      note: No WebSocket endpoint is documented anywhere in ATTOM's API documentation as of the review date.
    - protocol: Webhook
      scheme: https
      documented: false
      note: No outbound webhook / callback mechanism is documented for the ATTOM API; it is pull-only request/response.
