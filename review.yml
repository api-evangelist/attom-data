actions:
  asyncapiPath: null
  apisYmlUpdated: true
  reason: |
    No WebSocket protocol surface exists. ATTOM's public API is entirely
    synchronous request/response REST over HTTPS, authenticated with an apikey
    header. No AsyncAPI document was created because there is no server-push or
    streaming transport on ATTOM's API to model.
