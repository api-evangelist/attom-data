meters:
- name: api_calls
  description: API calls made against licensed endpoints, counted against the monthly plan allowance.
  unit: requests
  aggregation: sum
  dimensions:
  - account
  - endpoint
  - month
- name: licensed_datasets
  description: The resource families / endpoints licensed under the subscription (property, assessment, AVM, sales, mortgage, area, school, community, POI, etc.).
  unit: datasets
  aggregation: max
  dimensions:
  - account
- name: coverage
  description: Geographic coverage licensed (national vs. regional), a subscription cost lever.
  unit: regions
  aggregation: max
  dimensions:
  - account
principles:
- name: Visibility
  description: Track monthly API call volume per endpoint against the plan allowance and watch for approaches to the per-minute ceiling.
- name: Allocation
  description: Attribute calls to products/teams by API key and endpoint so property-data spend maps to internal cost centers.
- name: Optimization
  description: License only the resource families you use; prefer consolidated packages (expandedprofile, allevents, detailmortgageowner) over multiple single-purpose calls; cache stable property attributes to avoid repeat calls.
- name: Accountability
  description: Assign an owner for the ATTOM subscription; review monthly call usage against the allowance and renegotiate volume/coverage before overage accrues.
