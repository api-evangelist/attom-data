description: >-
  FinOps view of ATTOM API spend. ATTOM sells the API as a subscription rather
  than pure pay-as-you-go: cost is driven by the datasets/endpoints licensed and
  the committed monthly call volume, with a per-minute call ceiling and a
  monthly call allowance per plan. A 30-day free trial precedes any paid
  commitment. The dominant cost levers are which resource families you license
  (property, assessment, AVM, sales/deed, mortgage, area, school, community,
  POI, transportation noise, home equity), your monthly call volume against the
  plan allowance, geographic coverage, and delivery method (API vs. bulk/data
  warehouse). Overage and coverage expansion typically require renegotiation.
notes: >-
  ATTOM does not publish per-call list rates for the API, so unit economics must
  be reconciled with an ATTOM quote. Model spend as a committed subscription
  plus potential overage rather than metered per-call billing.
