aid: attom-data
url: https://raw.githubusercontent.com/api-evangelist/attom-data/refs/heads/main/apis.yml
name: ATTOM
kind: company
description: ATTOM Data Solutions is a national property, real estate, and location
  data provider that curates a multi-sourced warehouse of data on 158+ million U.S.
  properties. The ATTOM API (also delivered as ATTOM Cloud) exposes that data over
  REST as a family of logical resources - property characteristics, tax assessments,
  automated valuations (AVM), sales and deed history, mortgage records, area and
  boundary geographies, schools, community and neighborhood data, points of interest,
  transportation noise, all-event snapshots, and home equity - queried by address,
  APN/FIPS, ATTOM ID, radius, or geoIdV4 and authenticated with an API key.
image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
tags:
- Property Data
- Real Estate
- Location Data
- Valuation
- AVM
- Assessment
- Mortgage
- Neighborhood
created: '2026-07-03'
modified: '2026-07-03'
